# Render Blueprint - Camargo Psicopedagogia
# https://docs.render.com/blueprint-spec
# Variáveis de ambiente (GOOGLE_DRIVE_*, PASTA_ATENDIMENTOS_DIR) configure no Dashboard do serviço.

services:
  - type: web
    name: camargo-psicopedagogia
    runtime: python

    # Força uso de pip (não Poetry); exige requirements.txt na raiz do repo
    envVars:
      - key: NIXPACKS_PYTHON_PACKAGE_MANAGER
        value: pip

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
